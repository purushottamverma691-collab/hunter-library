<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Hunter Library | Premium Vault</title>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1a2e, #0f0f1a); 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px; min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5em; letter-spacing: 2px; color: #4cc9f0; text-shadow: 0 0 20px rgba(76, 201, 240, 0.5); }
        .shelf { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; max-width: 1200px; margin: auto; }
        .book { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 20px; text-align: center; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .book:hover { transform: scale(1.05); border-color: #4cc9f0; background: rgba(76, 201, 240, 0.1); }
        .cmd-box { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; color: #00ff00; margin: 20px 0; border-left: 4px solid #4cc9f0; }
        .btn { display: inline-block; padding: 12px 30px; background: #4cc9f0; color: #000; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hunter Library</h1>
        <p>प्रोफेशनल AI कमांड्स और ज्ञान का सुरक्षित संग्रह</p>
    </div>
    <div class="shelf">
        <div class="book">
            <h3>Cyber Security 101</h3>
            <p>बुनियादी सुरक्षा गाइड</p>
            <div class="cmd-box">git clone https://...</div>
            <a href="#" class="btn">Access Vault</a>
        </div>
        <div class="book">
            <h3>Automation Pro</h3>
            <p>टर्मक्स ऑटोमेशन स्क्रिप्ट्स</p>
            <div class="cmd-box">python3 main.py</div>
            <a href="#" class="btn">Access Vault</a>
        </div>        <div class="book">
            <h3>जीवन का सार</h3>
            <p>एक छोटी सी प्रेरणादायक कहानी</p>
            <div class="cmd-box">read story.txt</div>
            <a href="story.txt" class="btn">अभी पढ़ें</a>
        </div>

    </div>
</body>
</html>
