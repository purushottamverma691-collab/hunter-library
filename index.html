<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Hunter Library | Premium Vault</title>
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e, #0f0f1a); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5em; letter-spacing: 2px; color: #4cc9f0; text-shadow: 0 0 10px #4cc9f0; }
        .shelf { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .book { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .cmd-box { background: #000; padding: 15px; border-radius: 8px; font-family: monospace; color: #4cc9f0; margin: 15px 0; }
        .btn { display: inline-block; padding: 12px 30px; background: #4cc9f0; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hunter Library</h1>
        <p>प्रोफेशनल AI कमांड्स और ज्ञान का सुरक्षित संग्रह</p>
    </div>

    <div class="shelf">
        <!-- 1. Cyber Security -->
        <div class="book">
            <h3>Cyber Security 101</h3>
            <p>बुनियादी सुरक्षा गाइड</p>
            <div class="cmd-box">git clone https://...</div>
            <a href="#" class="btn">Access Vault</a>
        </div>

        <!-- 2. Automation -->
        <div class="book">
            <h3>Automation Pro</h3>
            <p>टर्मक्स ऑटोमेशन स्क्रिप्ट्स</p>
            <div class="cmd-box">python3 main.py</div>
            <a href="#" class="btn">Access Vault</a>
        </div>

        <!-- 3. Life Story -->
        <div class="book">
            <h3>जीवन का सार</h3>
            <p>एक छोटी सी प्रेरणादायक कहानी</p>
            <div class="cmd-box">read story.txt</div>
            <a href="story.txt" class="btn">अभी पढ़ें</a>
        </div>
    </div>
</body>
</html>
