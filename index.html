<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Library | AI Hub</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 40px 0; border-bottom: 2px solid #30363d; }
        h1 { color: #58a6ff; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 40px 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; transition: 0.3s; }
        .card:hover { border-color: #58a6ff; transform: translateY(-5px); }
        .btn { display: block; background: #238636; color: white; padding: 10px; text-align: center; border-radius: 6px; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Hunter Library</h1>
        <p>AI द्वारा रचित ज्ञान का डिजिटल खजाना</p>
    </div>

    <div class="grid">
        <!-- बुक 1 -->
        <div class="card">
            <h3>बुक का नाम यहाँ लिखें</h3>
            <p>यहाँ बुक के बारे में छोटी जानकारी दें...</p>
            <a href="#" class="btn">अभी पढ़ें</a>
        </div>
        <!-- बुक 2 -->
        <div class="card">
            <h3>अगली बुक यहाँ आएगी</h3>
            <p>यहाँ बुक के बारे में छोटी जानकारी दें...</p>
            <a href="#" class="btn">अभी पढ़ें</a>
        </div>
    </div>
</body>
</html>
